<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube 彈窗展示</title>
    <link rel="stylesheet" href="../../dist/css/main.css" />
  </head>
  <body>
    <div class="main-container video-page">
      <h1 class="title">YouTube 彈窗展示</h1>
      <p class="base-button-purple">
        <a href="../../index.html">← 返回首頁</a>
      </p>

      <div class="library-main-video-section-content">
        <div class="library-video-section-list">
          <div id="video-list-container" class="library-video-grid">
            <!-- 影片項目由 API getVideoList 載入後渲染 -->
          </div>

          <div class="load-more-container">
            <a
              id="load-more-video"
              class="base-button-purple"
              style="display: none"
            >
              載入更多 <i class="fa fa-refresh"></i>
            </a>
          </div>
        </div>
      </div>
    </div>

    <youtube-modal data-url="../data/video-details.json"></youtube-modal>

    <!-- Handlebars 模板：影片列表 -->
    <script id="video-item-template" type="text/x-handlebars-template">
      {{#each videos}}
      <div class="video-item" data-id="{{id}}">
        <div class="video-item-cover">
          <img src="{{#if coverImage}}{{coverImage}}{{else}}/web/res/zh_TW/MSITE_3/images/default.jpg{{/if}}"
              alt="{{title}}"
              onerror="this.onerror=null;this.src='/web/res/zh_TW/MSITE_3/images/default.jpg';">
          <div class="video-item-play-icon">
            <i class="fa fa-play"></i>
          </div>
        </div>
        <div class="video-item-info">
          <h3 class="video-item-title">{{title}}</h3>
        </div>
      </div>
      {{/each}}
    </script>

    <script src="https://cdn.jsdelivr.net/npm/handlebars@latest/dist/handlebars.min.js"></script>
    <script
      type="module"
      src="../../components/youtube-modal/src/index.js"
    ></script>
    <script src="../js/video.js"></script>
  </body>
</html>
